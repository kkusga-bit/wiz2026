apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: tasky-app-cluster-admin
subjects:
- kind: ServiceAccount
  name: tasky-app-sa
  namespace: tasky-lab
roleRef:
  kind: ClusterRole
  name: cluster-admin #의도된 보안 리스크 클러스터 전역 관리자 권한
  apiGroup: rbac.authorization.k8s.io